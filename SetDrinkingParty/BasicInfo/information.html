<!DOCTYPE html>

<html lang = "ja">

    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../../Common/style.css">
        <title>基本情報入力</title>
    </head>

    <body id="home">
        <p class="title">幹事のための飲み会設定アプリ</p>
        <p class="subtitle">基本情報入力</p>

        <form class="inputArea">
            <table>
                <tr>
                    <th><label>飲み会名称</label></th>
                    <td> <input type="text" class="informationInput" id="party"></td>
                </tr>
                  
                <tr>
                    <th><label>幹事名</label></th>
                    <td><input type="text" class="informationInput" id="organizer"></td>
                </tr>
        
                <tr>
                    <th><label>開催場所</label></th>
                    <td><input type="text" class="informationInput" id="place"></td>
                </tr>
        
                <tr>
                    <th><label>回答期限</label></th>
                    <td><input type="date" class="informationInput" id="deadline"></td>
                </tr>
            </table>
        </form>
        
        <form action = "../../Top/toppage.html">
            <button type="submit" class="back">戻る</button>
        </form>
        <form action = "../Attendees/attendees.html">
            <button type="submit" class="next">次へ</button>
        </form>
        
        <script type = "module" src="./information.js"></script>
    </body>
</html>
