<!DOCTYPE html>

<html lang = "ja">

    <head>
        <meta charset="jis utf-8">
        <link rel="stylesheet" href="style.css">
        <title>基本情報入力</title>
    </head>

    <body id="home">
        <p class="title">幹事のための飲み会設定アプリ</p>
        <p class="subtitle">基本情報入力</p>

        <form class="inputarea">
            <table>
                <tr>
                    <th><label>飲み会名称</label></th>
                    <td> <input type="text" id="party"></td>
                </tr>
                  
                <tr>
                    <th><label>幹事名</label></th>
                    <td><input type="text" id="organizer"></td>
                </tr>
        
                <tr>
                    <th><label>開催場所</label></th>
                    <td><input type="text" id="place"></td>
                </tr>
        
                <tr>
                    <th><label>回答期限</label></th>
                    <td><input type="date" id="deadline"></td>
                </tr>
            </table>
        </form>
        
        <p>
            <form action = "toppage.html">
                <button type="submit" class="back">戻る</button>
            </form>
            <form action = "attendee.html">
                <button type="submit" class="next">次へ</button>
            </form>
        </p>
        
        <script type = "module" src="./script.js"></script>
    </body>
</html>
